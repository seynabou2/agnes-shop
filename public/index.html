  <body>
    <noscript>Vous devez activer JavaScript pour utiliser ce site.</noscript>
    <div id="root"></div>
    <script>
      // Restaure l'URL après redirection depuis 404.html (GitHub Pages)
      (function() {
        var p = window.location.search.slice(1).split("&")
          .find(function(s) { return s.startsWith("p="); });
        if (p) {
          var path = decodeURIComponent(p.slice(2));
          window.history.replaceState(null, null, path);
        }
      })();
    </script>
  </body>
